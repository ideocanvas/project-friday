<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.7;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 60px 40px;
            text-align: center;
        }
        .header h1 { 
            font-size: 2.5em; 
            margin-bottom: 15px;
            line-height: 1.2;
        }
        .meta {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 15px;
        }
        .meta span { margin: 0 10px; }
        .author { font-weight: 600; }
        .content {
            padding: 40px;
        }
        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            line-height: 1.3;
        }
        h1 { font-size: 2em; border-bottom: 2px solid #eee; padding-bottom: 0.3em; }
        h2 { font-size: 1.5em; border-bottom: 1px solid #eee; padding-bottom: 0.3em; }
        h3 { font-size: 1.25em; }
        h4 { font-size: 1em; }
        p { margin-bottom: 1em; }
        /* Links */
        a { color: #667eea; text-decoration: none; }
        a:hover { text-decoration: underline; }
        /* Lists */
        ul, ol { margin: 1em 0; padding-left: 2em; }
        li { margin-bottom: 0.5em; }
        /* Code blocks */
        code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
            font-size: 0.9em;
        }
        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1em 0;
        }
        pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        /* Blockquotes */
        blockquote {
            border-left: 4px solid #667eea;
            padding-left: 20px;
            margin: 1em 0;
            color: #666;
            font-style: italic;
        }
        blockquote p { margin: 0; }
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1em 0;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #f8f9fa;
            font-weight: 600;
        }
        tr:hover { background: #f5f5f5; }
        /* Images */
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 1em 0;
        }
        figure {
            text-align: center;
            margin: 1.5em 0;
        }
        figcaption {
            font-size: 0.9em;
            color: #666;
            margin-top: 0.5em;
        }
        /* Horizontal rule */
        hr {
            border: none;
            border-top: 2px solid #eee;
            margin: 2em 0;
        }
        /* Callout boxes */
        .callout {
            padding: 20px;
            border-radius: 8px;
            margin: 1em 0;
        }
        .callout-info { background: #e7f3ff; border-left: 4px solid #2196F3; }
        .callout-warning { background: #fff3e0; border-left: 4px solid #FF9800; }
        .callout-success { background: #e8f5e9; border-left: 4px solid #4CAF50; }
        .callout-error { background: #ffebee; border-left: 4px solid #F44336; }
        .callout-title {
            font-weight: 600;
            margin-bottom: 0.5em;
        }
        /* Table of contents */
        .toc {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin: 1em 0;
        }
        .toc h3 { margin-top: 0; margin-bottom: 1em; }
        .toc ul { padding-left: 1.5em; }
        .toc a { color: #333; }
        .toc a:hover { color: #667eea; }
        /* Footer */
        .footer {
            text-align: center;
            padding: 30px;
            color: #666;
            font-size: 0.85em;
            border-top: 1px solid #eee;
        }
        /* Print styles */
        @media print {
            body { background: white; }
            .container { max-width: 100%; }
            .header { background: #333; }
        }
        /* Mobile responsive */
        @media (max-width: 600px) {
            .header { padding: 40px 20px; }
            .header h1 { font-size: 1.8em; }
            .content { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ title }}</h1>
            {% if subtitle %}
            <p class="subtitle">{{ subtitle }}</p>
            {% endif %}
            <div class="meta">
                {% if author %}
                <span class="author">By {{ author }}</span>
                {% endif %}
                {% if date %}
                <span class="date">{{ date }}</span>
                {% endif %}
                {% if tags %}
                <span class="tags">{{ tags }}</span>
                {% endif %}
            </div>
        </div>
        <div class="content">
            {% if toc %}
            <div class="toc">
                <h3>Table of Contents</h3>
                {{ toc }}
            </div>
            {% endif %}
            {{ content }}
        </div>
        <div class="footer">
            Generated by Friday AI Assistant
        </div>
    </div>
</body>
</html>
