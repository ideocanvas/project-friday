<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 1.8em; }
        .timestamp { opacity: 0.8; font-size: 0.9em; margin-top: 10px; }
        .content { padding: 20px; }
        .list-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            align-items: center;
        }
        .list-item:last-child { border-bottom: none; }
        .bullet {
            width: 8px;
            height: 8px;
            background: #38ef7d;
            border-radius: 50%;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .list-item.done .bullet { background: #999; }
        .list-item.done .text { text-decoration: line-through; color: #999; }
        .text { flex: 1; }
        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>{{ title }}</h1>
            <div class="timestamp">Generated: {{ timestamp }}</div>
        </div>
        <div class="content">
            {% for item in items %}
            <div class="list-item{% if item.done %} done{% endif %}">
                <div class="bullet"></div>
                <div class="text">{{ item.text if item is mapping else item }}</div>
            </div>
            {% endfor %}
        </div>
        <div class="footer">
            Generated by Friday AI Assistant
        </div>
    </div>
</body>
</html>
